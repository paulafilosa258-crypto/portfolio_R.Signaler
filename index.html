<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R.Signaler — Homepage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #02030a;
      color: #e8f2ff;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .home {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-image:
        radial-gradient(circle at 25% 20%, rgba(125,180,255,.18), transparent 24%),
        linear-gradient(90deg, rgba(0,0,0,.35), rgba(0,0,0,.18) 45%, rgba(0,0,0,.72)),
        linear-gradient(180deg, rgba(0,0,25,.10), rgba(0,0,0,.82)),
        url("assets/background-rsignaler.png");
      background-size: cover;
      background-position: center;
    }

    .fog {
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 0%, rgba(170,210,255,.08) 42%, transparent 70%);
      filter: blur(12px);
      animation: fogMove 9s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .logo {
      position: absolute;
      left: 7vw;
      top: 11vh;
      width: min(48vw, 760px);
      opacity: .92;
      filter: drop-shadow(0 0 16px rgba(160,210,255,.72)) drop-shadow(0 0 40px rgba(90,150,255,.32));
    }

    .menu {
      position: absolute;
      left: 8vw;
      top: 49vh;
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: min(520px, 80vw);
    }

    .menu a {
      position: relative;
      color: rgba(230, 240, 255, .82);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-size: clamp(1.6rem, 3vw, 3rem);
      padding: 8px 0 11px 55px;
      border-bottom: 1px solid rgba(190,220,255,.18);
      text-shadow: 0 0 14px rgba(130,180,255,.35);
      transition: .28s ease;
    }

    .menu a::before {
      content: "✦";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(210,235,255,.75);
      font-size: .72em;
      transition: .28s ease;
    }

    .menu a:hover, .menu a:focus {
      color: #fff;
      padding-left: 78px;
      text-shadow: 0 0 12px #fff, 0 0 30px rgba(130,190,255,.95);
      outline: none;
    }

    .menu a:hover::before, .menu a:focus::before {
      transform: translate(20px, -50%) scale(1.2);
      color: #fff;
      text-shadow: 0 0 15px #fff;
    }

    .press {
      position: absolute;
      left: 8vw;
      bottom: 8vh;
      font-size: clamp(.8rem, 1.2vw, 1.05rem);
      letter-spacing: 3px;
      color: rgba(235,242,255,.76);
      animation: blink 1.6s infinite;
    }

    .footer {
      position: absolute;
      bottom: 2.6vh;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: .9rem;
      color: rgba(235,235,235,.65);
      font-style: italic;
    }

    @keyframes blink {
      0%, 100% { opacity: .25; }
      50% { opacity: 1; }
    }

    @keyframes fogMove {
      from { transform: translateX(-5%) scale(1.05); opacity: .35; }
      to { transform: translateX(5%) scale(1.12); opacity: .7; }
    }

    @media (max-width: 760px) {
      .logo { width: 82vw; left: 50%; transform: translateX(-50%); top: 9vh; }
      .menu { left: 8vw; top: 44vh; gap: 13px; }
      .menu a { padding-left: 38px; letter-spacing: 2px; }
      .menu a:hover, .menu a:focus { padding-left: 54px; }
    }
  </style>
</head>
<body>
  <main class="home">
    <div class="fog"></div>

    <img src="assets/logo-rsignaler.png" alt="R.Signaler" class="logo" />

    <nav class="menu" aria-label="Menu principal">
      <a href="cv.html">Curriculum Vitae</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="player-details.html">Player Details</a>
      <a href="contact.html">Contact</a>
    </nav>

    <p class="press">PRESS ENTER TO CONTINUE</p>
    <p class="footer">© 2026, R.Signaler All rights Reserved.</p>
  </main>

  <script>
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Enter') {
        window.location.href = 'cv.html';
      }
    });
  </script>
</body>
</html>
